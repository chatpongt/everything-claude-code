<!DOCTYPE html>
<!--
  ════════════════════════════════════════════════════════════════
   index.html — เว็บแอปตัวอย่าง "ดึงข้อมูลมาแสดง"
   ────────────────────────────────────────────────────────────────
   ไฟล์เดียวจบ! มีครบทั้ง HTML + CSS + JavaScript
   เปิดใช้ได้เลยแค่ดับเบิลคลิกไฟล์นี้ ไม่ต้องติดตั้งอะไร

   โครงสร้างของไฟล์นี้แบ่งเป็น 3 ส่วน (เลื่อนอ่านคอมเมนต์ไปเรื่อยๆ):
     1) <style>  = หน้าตา/สี  (CSS)
     2) <body>   = โครงร่างหน้าจอ (HTML)
     3) <script> = การทำงาน/ดึงข้อมูล (JavaScript)
  ════════════════════════════════════════════════════════════════
-->
<html lang="th">
<head>
  <meta charset="UTF-8" />
  <!-- บรรทัดล่างนี้ทำให้เว็บแสดงผลสวยบนมือถือด้วย -->
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>ร้านค้าตัวอย่าง — ดึงข้อมูลมาแสดง</title>

  <!-- ═══════ ส่วนที่ 1: CSS (หน้าตา/สี) ═══════ -->
  <style>
    /* ตั้งค่าพื้นฐานทั้งหน้า */
    body {
      font-family: -apple-system, "Helvetica Neue", Arial, sans-serif;
      background: #f4f4f7;
      color: #222;
      margin: 0;
      padding: 24px;
    }

    h1 {
      text-align: center;
    }

    /* แถบค้นหาด้านบน */
    .toolbar {
      display: flex;
      gap: 8px;
      justify-content: center;
      margin: 16px 0 24px;
      flex-wrap: wrap;
    }

    #search {
      padding: 10px 14px;
      font-size: 16px;
      border: 1px solid #ccc;
      border-radius: 8px;
      width: 260px;
      max-width: 80vw;
    }

    button {
      padding: 10px 18px;
      font-size: 16px;
      border: none;
      border-radius: 8px;
      background: #4f46e5;
      color: white;
      cursor: pointer;
    }
    button:hover {
      background: #4338ca;
    }

    /* ตารางการ์ดสินค้า — ปรับจำนวนคอลัมน์เองอัตโนมัติตามขนาดจอ */
    #grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(220px, 1fr));
      gap: 16px;
      max-width: 1000px;
      margin: 0 auto;
    }

    /* การ์ดสินค้าแต่ละใบ */
    .card {
      background: white;
      border-radius: 12px;
      overflow: hidden;
      box-shadow: 0 1px 4px rgba(0, 0, 0, 0.1);
    }
    .card img {
      width: 100%;
      height: 160px;
      object-fit: cover;
      background: #eee;
    }
    .card .info {
      padding: 12px;
    }
    .card .title {
      font-weight: 600;
      margin-bottom: 6px;
    }
    .card .price {
      color: #4f46e5;
      font-weight: 700;
    }

    /* ข้อความสถานะ เช่น "กำลังโหลด..." */
    #status {
      text-align: center;
      color: #777;
      margin: 24px;
    }
  </style>
</head>

<body>
  <!-- ═══════ ส่วนที่ 2: HTML (โครงร่างหน้าจอ) ═══════ -->

  <h1>🛍️ ร้านค้าตัวอย่าง</h1>

  <div class="toolbar">
    <!-- ช่องพิมพ์ค้นหา -->
    <input id="search" type="text" placeholder="พิมพ์ค้นหาสินค้า เช่น phone..." />
    <!-- ปุ่มกดค้นหา / โหลดใหม่ -->
    <button id="loadBtn">ค้นหา / โหลดใหม่</button>
  </div>

  <!-- ข้อความสถานะ -->
  <p id="status">กำลังโหลดข้อมูล...</p>

  <!-- กล่องว่างๆ ตรงนี้ JavaScript จะเอาการ์ดสินค้ามาเติมให้ -->
  <div id="grid"></div>

  <!-- ═══════ ส่วนที่ 3: JavaScript (การทำงาน) ═══════ -->
  <script>
    // -------------------------------------------------------------
    // 1) จับ "องค์ประกอบ" บนหน้าเว็บมาเก็บไว้ในตัวแปร เพื่อสั่งงานได้ง่าย
    // -------------------------------------------------------------
    const grid = document.getElementById("grid");        // กล่องแสดงการ์ด
    const statusEl = document.getElementById("status");  // ข้อความสถานะ
    const searchEl = document.getElementById("search");  // ช่องค้นหา
    const loadBtn = document.getElementById("loadBtn");   // ปุ่ม

    // -------------------------------------------------------------
    // 2) ฟังก์ชันหลัก: ไปดึงข้อมูลจากอินเทอร์เน็ต แล้วเอามาแสดง
    //    คำว่า async/await แปลง่ายๆ ว่า "รอข้อมูลจากเน็ตให้เสร็จก่อน"
    // -------------------------------------------------------------
    async function loadProducts() {
      const keyword = searchEl.value.trim(); // ข้อความที่ผู้ใช้พิมพ์

      // เลือก "ที่อยู่ข้อมูล" (URL ของ API) ตามว่ามีคำค้นหาไหม
      // dummyjson.com เป็นเว็บฟรีสำหรับฝึก ให้ข้อมูลสินค้าปลอมมาเล่น
      const url = keyword
        ? `https://dummyjson.com/products/search?q=${keyword}&limit=12`
        : `https://dummyjson.com/products?limit=12`;

      statusEl.textContent = "กำลังโหลดข้อมูล...";
      grid.innerHTML = ""; // ล้างของเก่าออกก่อน

      try {
        // fetch = "ไปหยิบข้อมูลจาก URL นี้มา"
        const response = await fetch(url);
        // แปลงข้อมูลที่ได้ (เป็นข้อความ JSON) ให้เป็นออบเจกต์ที่ใช้งานได้
        const data = await response.json();

        const products = data.products; // รายการสินค้าทั้งหมด

        if (!products || products.length === 0) {
          statusEl.textContent = "ไม่พบสินค้า ลองคำอื่นดูครับ";
          return;
        }

        statusEl.textContent = `พบ ${products.length} รายการ`;

        // -------------------------------------------------------
        // 3) วนลูปสินค้าทีละชิ้น แล้วสร้างการ์ดให้แต่ละชิ้น
        // -------------------------------------------------------
        for (const p of products) {
          const card = document.createElement("div");
          card.className = "card";
          // เติมเนื้อหาลงในการ์ด (รูป + ชื่อ + ราคา)
          card.innerHTML = `
            <img src="${p.thumbnail}" alt="${p.title}" />
            <div class="info">
              <div class="title">${p.title}</div>
              <div class="price">$${p.price}</div>
            </div>
          `;
          grid.appendChild(card); // เอาการ์ดไปแปะในหน้าเว็บ
        }
      } catch (error) {
        // ถ้าเน็ตหลุดหรือมีปัญหา จะแสดงข้อความนี้แทนที่จะค้าง
        statusEl.textContent = "เกิดข้อผิดพลาด เช็กอินเทอร์เน็ตแล้วลองใหม่ครับ";
        console.error(error); // รายละเอียดเก็บไว้ใน Console สำหรับนักพัฒนา
      }
    }

    // -------------------------------------------------------------
    // 4) เชื่อม "เหตุการณ์" เข้ากับฟังก์ชัน
    //    = บอกว่าเมื่อผู้ใช้ทำอะไร ให้เรียกฟังก์ชันไหน
    // -------------------------------------------------------------
    loadBtn.addEventListener("click", loadProducts);   // กดปุ่ม -> โหลด
    searchEl.addEventListener("keydown", (e) => {       // กด Enter ในช่องค้นหา -> โหลด
      if (e.key === "Enter") loadProducts();
    });

    // โหลดข้อมูลครั้งแรกทันทีที่เปิดหน้าเว็บ
    loadProducts();
  </script>
</body>
</html>
